output_csv: results_implants.csv
output_interimplant_csv: results_interimplant.csv

# Technique folder paths (relative to project root)
#   Desktop Scanner          : trial/Desktop Scanner/
#   TRIOS (intraoral scanner): trial/Intraoral Scanner (TRIOS)/
#   Nexus (photogrammetry)   : trial/Nexus/
#   Shinning (photogrammetry): trial/Intraoral Photogrammetry (Shinning)/
#
# n_implants is inferred from Desktop Scanner STL file size:
#   0.967 MB = 4 implants  |  1.209 MB = 5  |  1.451 MB = 6
#   1.693 MB = 7 implants  |  1.935 MB = 8
#
# s9_md:  TRIOS alignment RMSE 1.6 mm — check n_implants and file pairing
# s20:    Nexus file missing — TRIOS + Shinning only
# s21:    Shinning file missing — TRIOS + Nexus only
# s6_md:  Shinning file missing — TRIOS + Nexus only

